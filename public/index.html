<!doctype html>

<html>
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width,initial-scale=1.0" name="viewport" />
    <title>Socket.IO chat</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Header Interface -->
    <header id="chat-header">
      <h1 id="room-name">All Conversations</h1>
      <div id="room-actions">
        <button class="room-btn btn-join" id="toggle-room-btn" type="button">
          New Conversation
        </button>
      </div>
    </header>
    <!-- Welcome Modal (Name Prompt) -->
    <div class="modal-overlay" id="name-modal">
      <div class="modal-container">
        <div class="modal-header">
          <h2>Welcome to the Chat</h2>
          <p>Login to join the conversation.</p>
        </div>
        <form class="modal-form" id="name-form">
          <div>
            <label class="sr-only" for="username">Username</label>
            <input
              autocomplete="off"
              class="modal-input"
              id="username"
              placeholder="Enter your username..."
              required=""
              type="text"
            />
            <label class="sr-only" for="password">Password</label>
            <input
              autocomplete="off"
              class="modal-input"
              id="password"
              placeholder="Enter your password..."
              required=""
              type="password"
            />
          </div>
          <button class="btn-primary" type="submit">Join</button>
        </form>
      </div>
    </div>
    <!-- Join Room Modal -->
    <div
      class="modal-overlay hidden"
      id="join-room-modal"
      style="display: none"
    >
      <div class="modal-container">
        <div class="modal-header">
          <h2>Messaging</h2>
          <p>Enter the name of the user you wish to message.</p>
        </div>
        <form class="modal-form" id="join-room-form">
          <div>
            <label class="sr-only" for="room-input">User</label>
            <input
              autocomplete="off"
              class="modal-input"
              id="room-input"
              placeholder="Enter room name..."
              required=""
              type="text"
            />
          </div>
          <div style="display: flex; gap: 0.5rem">
            <button class="btn-primary" type="submit">Message</button>
            <button
              class="btn-primary"
              id="close-join-modal"
              style="background-color: var(--input-bg); color: white"
              type="button"
            >
              Cancel
            </button>
          </div>
        </form>
      </div>
    </div>
    <ul id="messages"></ul>
    <form action="" id="form">
      <input autocomplete="off" id="input" /><button type="submit">Send</button>
    </form>
    <script src="/socket.io/socket.io.js"></script>

    <script src="script.js" type="module"></script>
  </body>
</html>
